<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Missão Aceita</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.box{
padding:30px;
animation:aparecer 2s ease;
}

h1{
color:#ffcc00;
font-size:28px;
}

p{
font-size:18px;
}

/* efeito brilho */
@keyframes aparecer{
0%{opacity:0; transform:scale(0.5);}
100%{opacity:1; transform:scale(1);}
}

/* efeito tipo energia */
.energia{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(255,255,0,0.2), transparent);
animation:pulsar 2s infinite;
}

@keyframes pulsar{
0%{opacity:0.2;}
50%{opacity:0.6;}
100%{opacity:0.2;}
}

</style>
</head>

<body>

<div class="energia"></div>

<div class="box">

<h1>Missão Aceita! 🎮</h1>

<p>Agora você faz parte dessa jornada comigo até o final do terceirão.</p>

<p>Prepare-se... essa aventura vai ser lendária! ⚡</p>

</div>

</body>
</html>
